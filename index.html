<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ecosistema Operativo - Destiny Real Estate</title>
    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- React y Babel -->
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <!-- Lucide Icons -->
    <script src="https://unpkg.com/lucide@latest"></script>
    
    <style>
        @keyframes spin-slow {
            from { transform: rotate(0deg); }
            to { transform: rotate(360deg); }
        }
        .animate-spin-slow {
            animation: spin-slow 8s linear infinite;
        }
        html {
            scroll-behavior: smooth;
        }
        /* Prevenir flash de contenido no estilizado */
        [v-cloak] { display: none; }
    </style>
</head>
<body class="bg-gray-50">
    <div id="root">
        <div class="flex items-center justify-center min-h-screen">
            <div class="text-center">
                <div class="inline-block w-8 h-8 border-4 border-blue-500 border-t-transparent rounded-full animate-spin mb-4"></div>
                <p class="text-gray-500 font-bold uppercase tracking-widest text-xs">Cargando Ecosistema...</p>
            </div>
        </div>
    </div>

    <script type="text/babel">
        const { useState, useEffect, useRef } = React;

        // Definición de iconos SVG manual para evitar errores de librería externa
        const Icon = ({ name, size = 20, className = "" }) => {
            const icons = {
                users: <svg xmlns="http://www.w3.org/2000/svg" width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}><path d="M16 21v-2a4 4 0 0 0-4-4H6a4 4 0 0 0-4 4v2"/><circle cx="9" cy="7" r="4"/><path d="M22 21v-2a4 4 0 0 0-3-3.87"/><path d="M16 3.13a4 4 0 0 1 0 7.75"/></svg>,
                cpu: <svg xmlns="http://www.w3.org/2000/svg" width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}><rect x="4" y="4" width="16" height="16" rx="2"/><rect x="9" y="9" width="6" height="6"/><path d="M15 2v2"/><path d="M15 20v2"/><path d="M2 15h2"/><path d="M2 9h2"/><path d="M20 15h2"/><path d="M20 9h2"/><path d="M9 2v2"/><path d="M9 20v2"/></svg>,
                pen: <svg xmlns="http://www.w3.org/2000/svg" width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}><path d="M12 19l7-7 3 3-7 7-3-3z"/><path d="M18 13l-1.5-7.5L2 2l3.5 14.5L13 18l5-5z"/><path d="M2 2l5 5"/><path d="M11 11l1 1"/></svg>,
                settings: <svg xmlns="http://www.w3.org/2000/svg" width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}><path d="M12.22 2h-.44a2 2 0 0 0-2 2v.18a2 2 0 0 1-1 1.73l-.43.25a2 2 0 0 1-2 0l-.15-.08a2 2 0 0 0-2.73.73l-.22.38a2 2 0 0 0 .73 2.73l.15.1a2 2 0 0 1 1 1.72v.51a2 2 0 0 1-1 1.74l-.15.09a2 2 0 0 0-.73 2.73l.22.38a2 2 0 0 0 2.73.73l.15-.08a2 2 0 0 1 2 0l.43.25a2 2 0 0 1 1 1.73V20a2 2 0 0 0 2 2h.44a2 2 0 0 0 2-2v-.18a2 2 0 0 1 1-1.73l.43-.25a2 2 0 0 1 2 0l.15.08a2 2 0 0 0 2.73-.73l.22-.39a2 2 0 0 0-.73-2.73l-.15-.08a2 2 0 0 1-1-1.74v-.5a2 2 0 0 1 1-1.74l.15-.09a2 2 0 0 0 .73-2.73l-.22-.38a2 2 0 0 0-2.73-.73l-.15.08a2 2 0 0 1-2 0l-.43-.25a2 2 0 0 1-1-1.73V4a2 2 0 0 0-2-2z"/><circle cx="12" cy="12" r="3"/></svg>,
                chart: <svg xmlns="http://www.w3.org/2000/svg" width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}><path d="M3 3v18h18"/><path d="M18 17V9"/><path d="M13 17V5"/><path d="M8 17v-3"/></svg>,
                check: <svg xmlns="http://www.w3.org/2000/svg" width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}><polyline points="20 6 9 17 4 12"/></svg>,
                refresh: <svg xmlns="http://www.w3.org/2000/svg" width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}><path d="M21 12a9 9 0 1 1-9-9c2.52 0 4.93 1 6.74 2.74L21 8"/><polyline points="21 3 21 8 16 8"/></svg>,
                file: <svg xmlns="http://www.w3.org/2000/svg" width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}><path d="M14.5 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V7.5L14.5 2z"/><polyline points="14.5 2 14.5 7 20 7"/></svg>,
                search: <svg xmlns="http://www.w3.org/2000/svg" width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg>,
                calendar: <svg xmlns="http://www.w3.org/2000/svg" width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}><rect x="3" y="4" width="18" height="18" rx="2" ry="2"/><line x1="16" y1="2" x2="16" y2="6"/><line x1="8" y1="2" x2="8" y2="6"/><line x1="3" y1="10" x2="21" y1="10"/></svg>,
                arrowRight: <svg xmlns="http://www.w3.org/2000/svg" width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}><line x1="5" y1="12" x2="19" y2="12"/><polyline points="12 5 19 12 12 19"/></svg>,
                chevronRight: <svg xmlns="http://www.w3.org/2000/svg" width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}><polyline points="9 18 15 12 9 6"/></svg>,
                zap: <svg xmlns="http://www.w3.org/2000/svg" width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}><polygon points="13 2 3 14 12 14 11 22 21 10 12 10 13 2"/></svg>
            };
            return icons[name] || icons.check;
        };

        const FlowNode = ({ id, icon, title, color, isActive, onClick }) => (
            <div 
                id={`node-${id}`}
                onClick={onClick}
                className={`relative flex flex-col items-center p-4 rounded-2xl border-2 transition-all duration-500 cursor-pointer w-full md:w-48 mb-4
                    ${isActive ? `border-${color}-500 bg-${color}-50 shadow-xl scale-105 z-10 ring-4 ring-${color}-200` : 'border-gray-200 bg-white hover:border-gray-300'}`}
            >
                <div className={`p-2 rounded-xl bg-${color}-100 mb-2 transition-colors duration-500`}>
                    <Icon name={icon} className={`text-${color}-600`} />
                </div>
                <span className="text-xs md:text-[11px] font-bold text-center text-gray-800 leading-tight uppercase tracking-tight">
                    {title}
                </span>
                {isActive && (
                    <div className="absolute -top-2 -right-2 bg-green-500 text-white p-1 rounded-full shadow-lg animate-bounce">
                        <Icon name="check" size={12} />
                    </div>
                )}
            </div>
        );

        const DepartmentHeader = ({ title, icon, color }) => (
            <div className={`flex flex-col items-center mb-6 md:sticky md:top-0 bg-white md:bg-gray-50/90 backdrop-blur-sm py-4 z-20 w-full border-b-2 border-${color}-200 rounded-t-2xl md:rounded-none shadow-sm md:shadow-none`}>
                <div className={`p-3 rounded-full bg-${color}-600 text-white mb-2 shadow-lg`}>
                    <Icon name={icon} size={22} />
                </div>
                <h3 className="text-sm md:text-[12px] font-black text-gray-800 uppercase tracking-widest text-center">{title}</h3>
            </div>
        );

        const App = () => {
            const logicFlow = [
                'inicio', 'temas', 'planeacion', 'gemini', 
                'research', 'curaduria', 'centralizacion', 'propuesta', 
                'aprobacion', 
                'elaboracion', 
                'revision_dudas', 
                'clickup', 'tareas', 'copies', 'config', 'publica', 
                'revision_pub', 'metricas', 'mejora', 
                'reportes', 'mejoras', 'registro', 'calificacion', 'ponderacion', 'fin'
            ];

            const [selectedNode, setSelectedNode] = useState('inicio');

            const departments = [
                {
                    id: 'team',
                    title: 'TEAM',
                    icon: 'users',
                    color: 'blue',
                    steps: [
                        { id: 'inicio', title: 'Inicio', icon: 'check' },
                        { id: 'temas', title: 'Definición de Temas', icon: 'pen' },
                        { id: 'planeacion', title: 'Planeación de Fechas', icon: 'calendar' },
                        { id: 'gemini', title: 'Carga en Gemini', icon: 'cpu', jumpTo: 'EQUIPO IA' },
                        { id: 'aprobacion', title: 'Aprobación Plan', icon: 'check', jumpTo: 'MKT CONTENIDOS' }
                    ]
                },
                {
                    id: 'ia',
                    title: 'EQUIPO IA',
                    icon: 'cpu',
                    color: 'purple',
                    steps: [
                        { id: 'research', title: 'Research de Medios', icon: 'search' },
                        { id: 'curaduria', title: 'Curaduría y Filtro', icon: 'settings' },
                        { id: 'centralizacion', title: 'Centralización Info', icon: 'file' },
                        { id: 'propuesta', title: 'Propuesta Semanal', icon: 'refresh', jumpTo: 'REGRESA A TEAM' }
                    ]
                },
                {
                    id: 'contenidos',
                    title: 'MKT CONTENIDOS',
                    icon: 'pen',
                    color: 'indigo',
                    steps: [
                        { id: 'elaboracion', title: 'Elabora Contenidos', icon: 'file', jumpTo: 'MKT OPERATIVO' },
                        { id: 'clickup', title: 'Sube a ClickUp', icon: 'check' },
                        { id: 'tareas', title: 'Crea Tareas', icon: 'settings' },
                        { id: 'copies', title: 'Elabora Copies', icon: 'pen' },
                        { id: 'config', title: 'Configura Fechas', icon: 'settings' },
                        { id: 'publica', title: 'Publica Contenidos', icon: 'zap', jumpTo: 'MKT OPERATIVO' }
                    ]
                },
                {
                    id: 'operativo',
                    title: 'MKT OPERATIVO',
                    icon: 'settings',
                    color: 'orange',
                    steps: [
                        { id: 'revision_dudas', title: 'Revisión (Dudas)', icon: 'search', jumpTo: 'REGRESA A CONTENIDOS' },
                        { id: 'revision_pub', title: 'Revisión Publicación', icon: 'check' },
                        { id: 'metricas', title: 'Métricas Semanales', icon: 'chart' },
                        { id: 'mejora', title: 'Mejora Continua', icon: 'chart', jumpTo: 'MKT ADMIN' }
                    ]
                },
                {
                    id: 'administrativo',
                    title: 'MKT ADMIN',
                    icon: 'chart',
                    color: 'emerald',
                    steps: [
                        { id: 'reportes', title: 'Genera Reportes', icon: 'file' },
                        { id: 'mejoras', title: 'Propuestas Mejora', icon: 'chart' },
                        { id: 'registro', title: 'Registro Leads', icon: 'users' },
                        { id: 'calificacion', title: 'Lead Scoring', icon: 'chart' },
                        { id: 'ponderacion', title: 'Ponderación Final', icon: 'check' },
                        { id: 'fin', title: 'Fin del Proceso', icon: 'check' }
                    ]
                }
            ];

            const handleNext = () => {
                const currentIndex = logicFlow.indexOf(selectedNode);
                const nextIndex = (currentIndex + 1) % logicFlow.length;
                const nextId = logicFlow[nextIndex];
                setSelectedNode(nextId);
                
                setTimeout(() => {
                    const element = document.getElementById(`node-${nextId}`);
                    if (element) {
                        element.scrollIntoView({ behavior: 'smooth', block: 'center' });
                    }
                }, 100);
            };

            const handleReset = () => {
                setSelectedNode('inicio');
                window.scrollTo({ top: 0, behavior: 'smooth' });
            };

            return (
                <div className="min-h-screen p-4 md:p-8 overflow-x-hidden pb-32">
                    <div className="max-w-[1400px] mx-auto">
                        <header className="mb-8 border-b border-gray-200 pb-6 flex flex-col md:flex-row justify-between items-center gap-4">
                            <div className="text-center md:text-left">
                                <h1 className="text-2xl md:text-3xl font-black text-gray-900 tracking-tighter uppercase italic">Flujo Operativo Real Estate</h1>
                                <p className="text-gray-400 text-[10px] md:text-xs font-bold tracking-widest uppercase">Secuencia lógica con retornos de validación</p>
                            </div>
                            <div className="flex gap-2">
                                <button onClick={handleReset} className="px-4 py-2 bg-white border border-gray-200 rounded-full text-gray-500 text-[10px] font-bold uppercase hover:bg-gray-50 shadow-sm">Reiniciar</button>
                                <div className="flex items-center gap-1.5 px-3 py-1.5 bg-blue-100 rounded-full text-blue-700 text-[9px] font-black uppercase">
                                    Paso {logicFlow.indexOf(selectedNode) + 1} de {logicFlow.length}
                                </div>
                            </div>
                        </header>

                        <div className="grid grid-cols-1 md:grid-cols-5 gap-6 md:gap-4 mb-12">
                            {departments.map((dept) => (
                                <div key={dept.id} className="flex flex-col items-center">
                                    <DepartmentHeader title={dept.title} icon={dept.icon} color={dept.color} />
                                    
                                    <div className="flex flex-col items-center w-full">
                                        {dept.steps.map((step, idx) => (
                                            <React.Fragment key={step.id}>
                                                <FlowNode 
                                                    id={step.id}
                                                    icon={step.icon}
                                                    title={step.title}
                                                    color={dept.color}
                                                    isActive={selectedNode === step.id}
                                                    onClick={() => setSelectedNode(step.id)}
                                                />
                                                
                                                {step.jumpTo && (
                                                    <div className={`mb-4 flex items-center justify-center gap-2 px-3 py-1 rounded-full text-[9px] font-black uppercase shadow-sm border w-full max-w-[180px]
                                                        ${step.jumpTo.includes('REGRESA') ? 'bg-orange-50 text-orange-600 border-orange-100' : 'bg-blue-50 text-blue-600 border-blue-100'}`}>
                                                        <Icon name={step.jumpTo.includes('REGRESA') ? "refresh" : "zap"} size={10} className={step.jumpTo.includes('REGRESA') ? "animate-spin-slow" : ""} />
                                                        <span className="truncate">{step.jumpTo}</span>
                                                    </div>
                                                )}

                                                {idx < dept.steps.length - 1 && !step.jumpTo && (
                                                    <div className={`h-4 w-0.5 mb-4 ${selectedNode === step.id ? `bg-${dept.color}-500` : 'bg-gray-200'}`} />
                                                )}
                                            </React.Fragment>
                                        ))}
                                    </div>
                                </div>
                            ))}
                        </div>

                        <div className="fixed bottom-6 left-1/2 -translate-x-1/2 flex items-center gap-4 z-50 w-[90%] md:w-auto">
                            <button 
                                onClick={handleNext}
                                className="flex-1 md:flex-none flex items-center justify-center gap-4 bg-gray-900 text-white px-10 py-5 rounded-2xl shadow-2xl hover:bg-black transition-all active:scale-95 group border-t border-white/20"
                            >
                                <div className="flex flex-col items-start leading-none text-left">
                                    <span className="text-[10px] font-bold text-gray-400 uppercase tracking-widest">Siguiente Paso</span>
                                    <span className="text-sm font-black uppercase tracking-tight">
                                        {logicFlow[logicFlow.indexOf(selectedNode) + 1]?.replace('_', ' ') || 'Reiniciar'}
                                    </span>
                                </div>
                                <div className="bg-white/10 p-2 rounded-xl group-hover:bg-white/20 transition-colors">
                                    <Icon name="chevronRight" size={24} />
                                </div>
                            </button>
                        </div>
                    </div>
                </div>
            );
        };

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
